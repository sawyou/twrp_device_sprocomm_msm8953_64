name: Build TWRP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4

    - name: Set up build environment
      run: |
        sudo apt update
        sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses-dev lib32ncurses-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 python-is-python3
        # Install repo tool
        sudo curl --create-dirs -L -o /usr/local/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
        sudo chmod a+x /usr/local/bin/repo

    - name: Clone TWRP manifest
      run: |
        git clone https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-9.0 twrp_manifest
        cd twrp_manifest
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-9.0
        repo sync -j2 --force-sync --no-clone-bundle
        # 显示根目录和 device 目录情况
        echo "=== Contents of twrp_manifest ==="
        ls -la
        echo "=== Contents of twrp_manifest/device (if exists) ==="
        if [ -d device ]; then ls -la device; else echo "device directory not found"; fi
        echo "=== Contents of twrp_manifest/device/sprocomm (if exists) ==="
        if [ -d device/sprocomm ]; then ls -la device/sprocomm; else echo "device/sprocomm not found"; fi

    - name: Link device tree
      run: |
        cd twrp_manifest
        # 如果 device 目录不存在，尝试手动创建
        if [ ! -d "device" ]; then
          echo "device directory missing, creating manually"
          mkdir -p device
        fi
        cd device
        mkdir -p sprocomm
        ln -s $GITHUB_WORKSPACE sprocomm/msm8953_64
        echo "Linked device tree at:"
        ls -la sprocomm/

    - name: Build recovery image
      run: |
        cd twrp_manifest
        . build/envsetup.sh
        lunch omni_msm8953_64-eng
        mka recoveryimage

    - name: Upload recovery image
      uses: actions/upload-artifact@v4
      with:
        name: TWRP_recovery
        path: twrp_manifest/out/target/product/msm8953_64/recovery.img
