name: Build TWRP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4

    - name: Set up build environment
      run: |
        sudo apt update
        sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 python-is-python3

    - name: Clone TWRP manifest
      run: |
        git clone https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-9.0 twrp_manifest
        cd twrp_manifest
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-9.0
        repo sync -j$(nproc) --force-sync

    - name: Link device tree
      run: |
        cd twrp_manifest/device
        mkdir -p sprocomm
        ln -s $GITHUB_WORKSPACE sprocomm/msm8953_64

    - name: Build recovery image
      run: |
        cd twrp_manifest
        . build/envsetup.sh
        lunch omni_msm8953_64-eng
        mka recoveryimage

    - name: Upload recovery image
      uses: actions/upload-artifact@v4
      with:
        name: TWRP_recovery
        path: twrp_manifest/out/target/product/msm8953_64/recovery.img
